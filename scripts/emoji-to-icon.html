<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emoji 转 TabBar 图标</title>
<style>
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: #f5f5f5;
  padding: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
}
.container {
  background: white;
  padding: 30px;
  border-radius: 16px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.1);
  max-width: 500px;
  width: 100%;
}
h1 {
  font-size: 18px;
  margin: 0 0 20px 0;
  color: #333;
}
.icon-row {
  display: flex;
  align-items: center;
  gap: 15px;
  padding: 15px 0;
  border-bottom: 1px solid #eee;
}
.icon-row:last-child {
  border-bottom: none;
}
.preview {
  width: 48px;
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  background: #f9f9f9;
  border-radius: 8px;
}
.info {
  flex: 1;
}
.info-name {
  font-weight: 600;
  color: #333;
  margin-bottom: 4px;
}
.info-emoji {
  font-size: 13px;
  color: #666;
}
.btn {
  padding: 8px 16px;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 500;
  transition: all 0.2s;
}
.btn-primary {
  background: #D4627A;
  color: white;
}
.btn-primary:hover {
  background: #B04560;
}
.btn-success {
  background: #7BA08C;
  color: white;
}
.btn-success:hover {
  background: #5A7A68;
}
.download-all {
  width: 100%;
  padding: 14px;
  margin-top: 20px;
  font-size: 16px;
}
.hidden {
  display: none;
}
</style>
</head>
<body>

<div class="container">
  <h1>Emoji 转 TabBar 图标</h1>

  <div class="icon-row">
    <div class="preview">🌸</div>
    <div class="info">
      <div class="info-name">首页</div>
      <div class="info-emoji">U+1F338 Cherry Blossom</div>
    </div>
    <button class="btn btn-primary" onclick="downloadIcon('home', '🌸')">下载</button>
  </div>

  <div class="icon-row">
    <div class="preview">📁</div>
    <div class="info">
      <div class="info-name">档案</div>
      <div class="info-emoji">U+1F4C1 File Folder</div>
    </div>
    <button class="btn btn-primary" onclick="downloadIcon('archives', '📁')">下载</button>
  </div>

  <div class="icon-row">
    <div class="preview">📖</div>
    <div class="info">
      <div class="info-name">知识</div>
      <div class="info-emoji">U+1F4D6 Open Book</div>
    </div>
    <button class="btn btn-primary" onclick="downloadIcon('knowledge', '📖')">下载</button>
  </div>

  <div class="icon-row">
    <div class="preview">👤</div>
    <div class="info">
      <div class="info-name">我的</div>
      <div class="info-emoji">U+1F464 Silhouette</div>
    </div>
    <button class="btn btn-primary" onclick="downloadIcon('profile', '👤')">下载</button>
  </div>

  <button class="btn btn-success download-all" onclick="downloadAll()">下载全部图标</button>
</div>

<canvas id="canvas" class="hidden"></canvas>

<script>
// TabBar 图标尺寸标准
const ICON_SIZE = 81;  // 微信小程序推荐 81x81 px @3x
const FONT_SIZE = 48;  // emoji 大小

function downloadIcon(name, emoji) {
  const canvas = document.getElementById('canvas');
  canvas.width = ICON_SIZE;
  canvas.height = ICON_SIZE;
  const ctx = canvas.getContext('2d');

  // 透明背景
  ctx.clearRect(0, 0, ICON_SIZE, ICON_SIZE);

  // 绘制 emoji
  ctx.font = `${FONT_SIZE}px "Segoe UI Emoji", "Apple Color Emoji", "Noto Color Emoji", sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(emoji, ICON_SIZE / 2, ICON_SIZE / 2 + 2);

  // 下载
  const link = document.createElement('a');
  link.download = `${name}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

function downloadAll() {
  const icons = [
    { name: 'home', emoji: '🌸' },
    { name: 'archives', emoji: '📁' },
    { name: 'knowledge', emoji: '📖' },
    { name: 'profile', emoji: '👤' }
  ];

  icons.forEach((icon, index) => {
    setTimeout(() => downloadIcon(icon.name, icon.emoji), index * 300);
  });
}
</script>

</body>
</html>
